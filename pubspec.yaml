name: betogether
description: "BeTogether — Social Map App. Stay connected with friends, together."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.6
  firebase_database: ^11.3.5
  firebase_messaging: ^15.0.3

  # Auth Providers
  google_sign_in: ^6.2.2

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Location
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  flutter_background_service: ^5.0.12
  battery_plus: ^7.0.0
  connectivity_plus: ^6.1.1

  # Media / Cloudinary
  http: ^1.2.2
  flutter_image_compress: ^2.4.0
  cached_network_image: ^3.4.1
  image_picker: ^1.2.2

  # UI & Fonts
  google_fonts: ^6.2.1
  lottie: ^3.3.1

  # Navigation & State
  go_router: ^14.6.3
  flutter_riverpod: ^2.6.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  flutter_local_notifications: ^17.2.2
  googleapis_auth: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.13
  fake_cloud_firestore: ^3.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
